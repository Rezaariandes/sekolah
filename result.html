<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujian Online — Hasil & Evaluasi</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══ ROOT & THEMES ══ */
:root {
  --bg: #f0f4ff; --bg2: #e6ecff;
  --card: #ffffff;
  --border: rgba(99,102,241,0.13);
  --acc: #4f46e5; --acc2: #7c3aed;
  --acc-rgb: 79,70,229; --acc-light: #ede9fe;
  --hi: #18181b; --lo: #71717a;
  --success: #16a34a; --success-bg: #dcfce7; --success-rgb: 22,163,74;
  --danger: #dc2626; --danger-bg: #fee2e2;
  --shadow: 0 4px 24px rgba(79,70,229,0.10);
  --shadow-lg: 0 12px 48px rgba(79,70,229,0.18);
}
body.theme-SD  { --acc: #e11d48; --acc2: #be123c; --acc-rgb: 225,29,72;  --acc-light: #ffe4e6; }
body.theme-SMP { --acc: #0284c7; --acc2: #0369a1; --acc-rgb: 2,132,199;  --acc-light: #e0f2fe; }
body.theme-SMA { --acc: #7c3aed; --acc2: #6d28d9; --acc-rgb: 124,58,237; --acc-light: #ede9fe; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg); color: var(--hi);
  min-height: 100vh; overflow-x: hidden;
  display: flex; flex-direction: column;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 700px 500px at 10% 20%, rgba(var(--acc-rgb),0.08) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 90% 80%, rgba(var(--acc-rgb),0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* ══ RESULT LAYOUT ══ */
.result-page {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 40px 24px; position: relative; z-index: 1;
}

.result-wrap {
  width: 100%; max-width: 600px;
  animation: popIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.93) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ══ SCORE HERO ══ */
.score-hero {
  position: relative; text-align: center;
  padding: 52px 40px 38px; margin-bottom: 16px;
  background: linear-gradient(145deg, var(--acc), var(--acc2));
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 16px 48px rgba(var(--acc-rgb),0.35);
}
.score-hero::before {
  content: ''; position: absolute;
  width: 350px; height: 350px; border-radius: 50%;
  background: rgba(255,255,255,0.07);
  top: -120px; left: 50%; transform: translateX(-50%);
}
.score-hero::after {
  content: ''; position: absolute;
  width: 200px; height: 200px; border-radius: 50%;
  background: rgba(255,255,255,0.05);
  bottom: -60px; right: -40px;
}
.score-lbl { font-size: 11px; color: rgba(255,255,255,0.65); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px; position: relative; z-index:1; }
.score-big {
  font-family: 'Merriweather', serif; font-size: 108px; font-weight: 800;
  color: #fff; line-height: 1; position: relative; z-index: 1;
  letter-spacing: -2px; text-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.score-unit { font-size: 30px; font-family: 'Merriweather', serif; font-weight: 800; color: rgba(255,255,255,0.55); }
.score-verdict { font-size: 20px; font-weight: 800; font-family: 'Merriweather', serif; color: #fff; position: relative; z-index:1; }
.score-streak { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 8px; position: relative; z-index:1; }
.score-streak strong { color: #fff; }

/* ══ INFO GRID ══ */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.info-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow);
}
.info-card-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--lo); margin-bottom: 5px; }
.info-card-val { font-size: 15px; font-weight: 700; color: var(--hi); }

.save-pill { text-align: center; font-size: 12px; color: var(--lo); padding: 10px; margin-bottom: 12px; }

/* ══ REVIEW SOAL (EVALUASI) ══ */
.review-section {
  margin-top: 30px; margin-bottom: 20px;
}
.review-title {
  font-family: 'Merriweather', serif; font-size: 20px; font-weight: 800; 
  color: var(--hi); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.review-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 20px; margin-bottom: 12px; box-shadow: var(--shadow);
}
.review-card.benar { border-left: 6px solid var(--success); }
.review-card.salah { border-left: 6px solid var(--danger); }
.review-q-num {
  font-size: 12px; font-weight: 700; color: var(--lo); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between;
}
.badge-status { padding: 4px 8px; border-radius: 6px; font-size: 10px; color: #fff; }
.badge-status.benar { background: var(--success); }
.badge-status.salah { background: var(--danger); }
.review-q-text { font-size: 15px; font-weight: 600; color: var(--hi); margin-bottom: 16px; line-height: 1.6; }
.review-ans-box {
  background: var(--bg); padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 8px;
}
.review-ans-box strong { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.user-ans { color: var(--danger); font-weight: 600; }
.correct-ans { color: var(--success); font-weight: 600; }

/* ══ BUTTONS ══ */
.btn-wa-big {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 700; font-family: 'Source Sans 3', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 10px; box-shadow: 0 4px 20px rgba(37,211,102,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-wa-big:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.45); }
.btn-wa-big svg { width: 22px; height: 22px; fill: currentColor; }

.btn-retry-link {
  width: 100%; padding: 13px;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--lo);
  font-size: 13px; font-weight: 600; font-family: 'Source Sans 3', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.btn-retry-link:hover { color: var(--hi); border-color: rgba(var(--acc-rgb),0.3); }

/* ══ FOOTER ══ */
#global-footer {
  width: 100%; text-align: center; font-size: 11px; color: var(--lo);
  background: rgba(255,255,255,0.88); border-top: 1px solid var(--border);
  padding: 10px 16px; line-height: 1.4; position: relative; z-index: 1;
}
#global-footer strong { color: var(--acc); font-weight: 600; }

/* ══ ERROR STATE ══ */
.error-wrap {
  text-align: center; padding: 40px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.error-wrap h2 { font-family: 'Merriweather', serif; font-size: 22px; color: var(--hi); }
.error-wrap p  { font-size: 14px; color: var(--lo); }
.btn-back {
  padding: 12px 28px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  color: #fff; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; font-family: 'Source Sans 3', sans-serif;
  cursor: pointer; box-shadow: 0 4px 20px rgba(var(--acc-rgb),0.35);
}
</style>
</head>
<body>

<div class="result-page" id="result-page">
  <!-- Diisi oleh JS -->
</div>

<div id="global-footer">
  &copy; 2026 <strong>dr. Reza Ariandes Sahputra</strong> &nbsp;&mdash;&nbsp; Ujian Online &mdash; Hak cipta dilindungi undang-undang
</div>

<script>
// URL App Script Bapak
const API_URL = "https://script.google.com/macros/s/AKfycby8QJK2zHTdoQJHXzdUTpPULtojBE96ED_1VvLNMuPx2s6ReOoKVMt6GsKGywBXcLhfwQ/exec";

// ── Baca data hasil dari sessionStorage (fallback: localStorage) ──
const _get = k => sessionStorage.getItem(k) || localStorage.getItem(k);
const skor       = _get('hasilSkor');
const nilaiAkhir = _get('hasilNilai');
const total      = _get('hasilTotal');
const waktuISO   = _get('hasilWaktu');
const nama       = _get('examNama');
const noWA       = _get('examWA');
const tingkat    = _get('examTingkat');
const kelas      = _get('examKelas');
const mapel      = _get('examMapel');

// Ambil data soal dan jawaban untuk fitur review
const soalAktifJSON = _get('examSoalAktif');
const jawabanUserJSON = _get('examJawaban');

// Jika statusnya Trial, tambahkan label [TRIAL]
const isTrial = window.location.search.includes('trial=true') || (nama === 'Trial' && noWA === '00000');
const namaUjian  = isTrial ? `[TRIAL] ${mapel} · ${tingkat} Kelas ${kelas}` : `${mapel} · ${tingkat} Kelas ${kelas}`;

const page = document.getElementById('result-page');

// Jika tidak ada data hasil, tampilkan error
if (!skor || !nama) {
  page.innerHTML = `
    <div class="error-wrap">
      <div style="font-size:52px">🔍</div>
      <h2>Data hasil tidak ditemukan</h2>
      <p>Sesi ujian tidak ditemukan atau sudah kadaluarsa.<br>Silakan kembali dan ikuti ujian dari awal.</p>
      <button class="btn-back" onclick="window.location.href='index.html'">← Kembali ke Halaman Utama</button>
    </div>`;
} else {
  // Terapkan tema warna
  if (tingkat) document.body.classList.add('theme-' + tingkat);

  const waktuSelesai = waktuISO ? new Date(waktuISO) : new Date();
  const tgl = waktuSelesai.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  const jam = waktuSelesai.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const n   = parseFloat(nilaiAkhir);

  const verdict =
    n >= 90 ? 'SEMPURNA! 🏆' :
    n >= 80 ? 'LUAR BIASA! 🎉' :
    n >= 70 ? 'BAGUS SEKALI! 👏' :
    n >= 60 ? 'CUKUP BAIK 👍' : 'TETAP SEMANGAT! 📚';

  // ── GENERATE REVIEW SOAL (Hanya Benar/Salah) ──
  let reviewHTML = "";
  if (soalAktifJSON && jawabanUserJSON) {
    try {
      const soalList = JSON.parse(soalAktifJSON);
      const userAns = JSON.parse(jawabanUserJSON);
      
      reviewHTML += `<div class="review-section">
        <div class="review-title">📝 Evaluasi Jawaban</div>`;

      soalList.forEach((soal, index) => {
        const jawabanSiswa = userAns[index] || "Tidak dijawab";
        const jawabanBenar = soal.jawaban_benar;
        const isBenar = (jawabanSiswa === jawabanBenar);
        
        reviewHTML += `
          <div class="review-card ${isBenar ? 'benar' : 'salah'}">
            <div class="review-q-num">
              Soal No. ${index + 1}
              <span class="badge-status ${isBenar ? 'benar' : 'salah'}">${isBenar ? 'BENAR' : 'SALAH'}</span>
            </div>
            <div class="review-q-text">${soal.pertanyaan}</div>
            
            <div class="review-ans-box">
              <strong>Jawaban Kamu:</strong>
              <span class="${isBenar ? 'correct-ans' : 'user-ans'}">${jawabanSiswa}</span>
            </div>
          </div>
        `;
      });
      
      reviewHTML += `</div>`;
    } catch (e) {
      console.error("Gagal memuat review:", e);
    }
  }

  page.innerHTML = `
    <div class="result-wrap">
      <div class="score-hero">
        <div class="score-lbl">Nilai Akhir</div>
        <div>
          <span class="score-big" id="score-big">0</span><span class="score-unit">/100</span>
        </div>
        <div class="score-verdict">${verdict}</div>
        <div class="score-streak">Menjawab benar <strong>${skor}</strong> dari <strong>${total}</strong> soal</div>
      </div>

      <div class="info-grid">
        <div class="info-card"><div class="info-card-lbl">Peserta</div><div class="info-card-val">${nama}</div></div>
        <div class="info-card"><div class="info-card-lbl">Ujian</div><div class="info-card-val">${namaUjian}</div></div>
        <div class="info-card"><div class="info-card-lbl">Jawaban Benar</div><div class="info-card-val">${skor} / ${total}</div></div>
        <div class="info-card"><div class="info-card-lbl">Selesai</div><div class="info-card-val">${tgl}, ${jam}</div></div>
      </div>

      <div class="save-pill" id="save-status">Menyimpan data ke server...</div>

      <button class="btn-wa-big" onclick="kirimKeWA()">
        <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 3.825 0 6.938 3.112 6.938 6.937 0 3.824-3.113 6.938-6.938 6.938z"/></svg>
        Kirim Hasil ke WhatsApp
      </button>
      <button class="btn-retry-link" onclick="ulangiUjian()">↺ Selesai & Kembali ke Awal</button>

      <!-- Tempat memunculkan Evaluasi Jawaban -->
      ${reviewHTML}

    </div>
  `;

  // Animasi angka naik
  animateScore(n);

  // Kirim data ke Google Sheets HANYA jika bukan Trial
  if (!isTrial) {
    const data = { nama, noWA, tingkat, kelas, mapel, skor: parseInt(skor), nilaiAkhir };
    fetch(API_URL, { method: 'POST', body: JSON.stringify(data) })
      .then(r => r.json())
      .then(() => document.getElementById('save-status').innerHTML =
        `<span style="color:#16a34a">✔ Data berhasil disimpan ke server</span>`)
      .catch(() => document.getElementById('save-status').innerHTML =
        `<span style="color:#dc2626">✖ Gagal menyimpan ke server</span>`);
  } else {
    document.getElementById('save-status').innerHTML = `<span style="color:var(--warn)">Mode Uji Coba: Data tidak disimpan ke server.</span>`;
  }
}

function animateScore(target) {
  const el = document.getElementById('score-big');
  if (!el) return;
  let cur = 0; const step = target / 60;
  const t = setInterval(() => {
    cur = Math.min(cur + step, target);
    el.innerText = cur.toFixed(cur >= target ? 2 : 0);
    if (cur >= target) clearInterval(t);
  }, 16);
}

function kirimKeWA() {
  let no = (noWA || '').replace(/\D/g, '');
  if (no.startsWith('0')) no = '62' + no.substring(1);
  const waktuSelesai = waktuISO ? new Date(waktuISO) : new Date();
  const tgl = waktuSelesai.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  const jam = waktuSelesai.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const teks = `*Laporan Hasil Ujian Online* 🎓\n\n*Ujian:* ${namaUjian}\n*Peserta:* ${nama}\n*Tanggal:* ${tgl}\n*Jam Selesai:* ${jam}\n*Nilai:* ${nilaiAkhir}\n\n_Benar ${skor} dari ${total} soal._\n\nTerima kasih.`;
  window.open(`https://wa.me/${no}?text=${encodeURIComponent(teks)}`, '_blank');
}

function ulangiUjian() {
  const keys = ['hasilSkor','hasilNilai','hasilTotal','hasilWaktu','examJawaban',
    'examNama','examWA','examTingkat','examKelas','examMapel',
    'examSoal','examEndTime','examSoalAktif','examPilihanOrder'];
  keys.forEach(k => { sessionStorage.removeItem(k); localStorage.removeItem(k); });
  window.location.href = 'index.html';
}
</script>
</body>
</html>
