<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KlikCBT — Ujian Online</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  overflow: hidden;
}

/* ══ SPLASH ══ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}
#splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }

.splash-logo {
  font-size: 52px; font-weight: 900; color: #fff;
  letter-spacing: -0.03em; font-family: Georgia, serif;
}
.splash-logo span { color: rgba(255,255,255,0.5); }

.splash-bar-track {
  width: 180px; height: 3px;
  background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden;
}
.splash-bar-fill {
  height: 100%; background: #fff; border-radius: 99px; width: 0%;
  transition: width 0.3s ease;
}
.splash-txt {
  font-size: 11px; color: rgba(255,255,255,0.55);
  letter-spacing: 0.14em; text-transform: uppercase;
}

/* ══ RESUME BANNER ══ */
#resume-banner {
  display: none;
  position: fixed; inset: 0; z-index: 8000;
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 24px; padding: 32px; text-align: center;
}
#resume-banner.show { display: flex; }

.resume-icon { font-size: 56px; }
.resume-title {
  font-size: 24px; font-weight: 800; color: #fff;
  font-family: Georgia, serif;
}
.resume-card {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px; padding: 16px 28px; color: #fff;
}
.resume-label { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
.resume-name  { font-size: 18px; font-weight: 700; }
.resume-sub   { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 2px; }

.resume-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
.resume-btn {
  width: 100%; padding: 14px 20px; border-radius: 12px; border: none;
  cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit;
  transition: transform 0.15s, box-shadow 0.15s;
}
.resume-btn:hover { transform: translateY(-2px); }
.btn-lanjut { background: #fff; color: #4f46e5; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.btn-baru   { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.25); }

/* ══ IFRAME ══ */
#main-frame {
  width: 100%; height: 100vh; border: none; display: block;
}

/* ══ ERROR ══ */
#error-screen {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: #f0f4ff; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
}
#error-screen.show { display: flex; }
.err-icon  { font-size: 52px; }
.err-title { font-size: 22px; font-weight: 700; color: #18181b; }
.err-msg   { font-size: 14px; color: #71717a; max-width: 360px; line-height: 1.7; }
.err-retry {
  padding: 12px 28px; background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.2s;
}
.err-retry:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">Klik<span>CBT</span></div>
  <div class="splash-bar-track"><div class="splash-bar-fill" id="splash-bar"></div></div>
  <div class="splash-txt" id="splash-txt">Memuat...</div>
</div>

<!-- Resume Banner — muncul saat ada sesi tersimpan -->
<div id="resume-banner">
  <div class="resume-icon">📋</div>
  <div class="resume-title">Sesi Ujian Ditemukan</div>
  <div class="resume-card">
    <div class="resume-label">Peserta</div>
    <div class="resume-name" id="resume-name">—</div>
    <div class="resume-sub"  id="resume-sub">—</div>
  </div>
  <div class="resume-actions">
    <button class="resume-btn btn-lanjut" onclick="doResume()">▶ Lanjutkan Ujian</button>
    <button class="resume-btn btn-baru"   onclick="doFresh()">✕ Mulai dari Awal</button>
  </div>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Gagal Memuat Halaman</div>
  <div class="err-msg" id="err-detail">Tidak dapat terhubung ke server.</div>
  <button class="err-retry" onclick="retryLoad()">↺ Coba Lagi</button>
</div>

<!-- Iframe utama -->
<iframe id="main-frame"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-modals"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope">
</iframe>

<script>
// ════════════════════════════════════════════════════════════════
//  ⚙️  KONFIGURASI
// ════════════════════════════════════════════════════════════════
const CFG = {
  BASE : "https://rezaariandes.github.io/sekolah",  // ← ganti jika perlu
  PAGES: {
    home  : "index.html",
    exam  : "exam.html",
    result: "result.html",
  },
  SK: "klikcbt_sesi",   // localStorage key
  MAX_AGE: 4 * 60 * 60 * 1000,  // 4 jam
};
// ════════════════════════════════════════════════════════════════

const frame     = document.getElementById('main-frame');
const splashEl  = document.getElementById('splash');
const splashBar = document.getElementById('splash-bar');
const splashTxt = document.getElementById('splash-txt');
const errScr    = document.getElementById('error-screen');
const errDetail = document.getElementById('err-detail');
const banner    = document.getElementById('resume-banner');

// ══ Splash ══
let _barTimer = null, _barPct = 0;

function splashStart(txt) {
  errScr.classList.remove('show');
  banner.classList.remove('show');
  splashEl.classList.remove('hide');
  splashTxt.textContent = txt || 'Memuat...';
  _barPct = 0; splashBar.style.width = '0%';
  clearInterval(_barTimer);
  _barTimer = setInterval(() => {
    _barPct = Math.min(_barPct + Math.random() * 15, 85);
    splashBar.style.width = _barPct + '%';
  }, 200);
}

function splashDone() {
  clearInterval(_barTimer);
  splashBar.style.width = '100%';
  splashTxt.textContent = 'Siap!';
  setTimeout(() => splashEl.classList.add('hide'), 400);
}

// ══ Session ══
function saveSession(page, paramsStr) {
  try {
    localStorage.setItem(CFG.SK, JSON.stringify({
      page,
      params: paramsStr || '',
      at: Date.now(),
    }));
  } catch(e) {}
}

function clearSession() {
  try { localStorage.removeItem(CFG.SK); } catch(e) {}
}

function readSession() {
  try {
    const raw = localStorage.getItem(CFG.SK);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d.page || !CFG.PAGES[d.page]) return null;
    if (Date.now() - d.at > CFG.MAX_AGE) { clearSession(); return null; }
    return d;
  } catch(e) { return null; }
}

// ══ Load iframe — TANPA preflight fetch ══
// Langsung set src, biarkan browser yang handle error
function loadFrame(pageName, paramsStr) {
  const file = CFG.PAGES[pageName];
  if (!file) return;

  const url = paramsStr
    ? `${CFG.BASE}/${file}?${paramsStr}`
    : `${CFG.BASE}/${file}`;

  // Simpan/hapus sesi
  if (pageName === 'home') {
    clearSession();
  } else {
    // Pastikan params disimpan sebagai string murni
    saveSession(pageName, typeof paramsStr === 'string' ? paramsStr : '');
  }

  splashStart('Menghubungkan ke server...');
  frame.src = url;

  frame.onload = () => splashDone();

  frame.onerror = () => {
    clearInterval(_barTimer);
    splashEl.classList.add('hide');
    errDetail.textContent = 'Gagal memuat halaman dari server. Periksa koneksi internet.';
    errScr.classList.add('show');
  };
}

// ══ Banner aksi ══
function doResume() {
  const s = readSession();
  if (s) loadFrame(s.page, s.params);
  else   loadFrame('home', '');
}

function doFresh() {
  clearSession();
  loadFrame('home', '');
}

function retryLoad() {
  const s = readSession();
  if (s) loadFrame(s.page, s.params);
  else   loadFrame('home', '');
}

// ══ Pesan dari iframe ══
window.addEventListener('message', function(e) {
  if (!e.data || typeof e.data !== 'object') return;

  // Selesai ujian → pindah ke result
  if (e.data.action === 'selesai' && e.data.nav === 'result') {
    clearSession();
    loadFrame('result', e.data.params || '');
    return;
  }

  // Navigasi umum dari iframe
  if (e.data.nav && CFG.PAGES[e.data.nav]) {
    loadFrame(e.data.nav, e.data.params || '');
    return;
  }

  // Kembali ke home
  if (e.data.action === 'kembaliHome') {
    clearSession();
    loadFrame('home', '');
    return;
  }
});

// ════════════════════════════════════════════════════════════════
//  🚀  INIT
// ════════════════════════════════════════════════════════════════
(function init() {
  const sesi = readSession();

  if (sesi && sesi.page && sesi.page !== 'home') {
    // ── Ada sesi tersimpan → tampilkan banner konfirmasi ──
    splashEl.classList.add('hide');

    // Isi detail sesi di banner
    try {
      const p    = new URLSearchParams(sesi.params);
      const nama    = p.get('nama')    || '';
      const mapel   = p.get('mapel')   || '';
      const tingkat = p.get('tingkat') || '';
      const kelas   = p.get('kelas')   || '';

      document.getElementById('resume-name').textContent = nama || 'Peserta';
      document.getElementById('resume-sub').textContent  =
        [mapel, tingkat, kelas ? 'Kelas ' + kelas : ''].filter(Boolean).join(' · ');
    } catch(e) {
      document.getElementById('resume-name').textContent = 'Sesi ujian sebelumnya';
      document.getElementById('resume-sub').textContent  = '';
    }

    banner.classList.add('show');

  } else {
    // ── Tidak ada sesi → langsung ke home ──
    loadFrame('home', '');
  }
})();
</script>
</body>
</html>
